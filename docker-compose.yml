version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: kb-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=osint

  redis:
    image: redis:alpine
    container_name: kb-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nats:
    image: nats:latest
    container_name: kb-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js" # Enable JetStream
    restart: unless-stopped

  # web-check-api: internal only — no host ports exposed
  webcheck-api:
    image: lissy93/web-check-api
    container_name: kb-webcheck
    restart: unless-stopped
    # No `ports:` — reachable only inside the Docker network as http://kb-webcheck:3000

  gateway:
    build: ./gateway
    container_name: kb-gateway
    ports:
      - "4000:4000"
    depends_on:
      - nats
      - redis
    environment:
      - REDIS_HOST=kb-redis
    volumes:
      - ./proto:/app/proto
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: kb-user-service
    depends_on:
      - mongodb
      - nats
      - redis
    environment:
      - MONGO_URI=mongodb://mongodb:27017/osint
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./proto:/app/proto
    restart: unless-stopped

  asset-service:
    build: ./asset-service
    container_name: kb-asset-service
    ports:
      - "50051:50051"
    depends_on:
      - nats
      - redis
      - webcheck-api
    environment:
      - WEBCHECK_API_URL=http://kb-webcheck:8080
      - REDIS_URL=redis://kb-redis:6379
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - VT_API_KEY=${VT_API_KEY:-}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - OTX_API_KEY=${OTX_API_KEY:-}
      - NVD_API_KEY=${NVD_API_KEY:-}
    volumes:
      - ./proto:/app/proto
    restart: unless-stopped

  ai-copilot-service:
    build:
      context: .
      dockerfile: ai-copilot-service/Dockerfile
    container_name: kb-ai-copilot-service
    depends_on:
      - nats
    volumes:
      - ./proto:/app/proto
    restart: unless-stopped

  camera-service:
    build:
      context: .
      dockerfile: camera-service/Dockerfile
    container_name: kb-camera-service
    depends_on:
      - nats
    volumes:
      - ./proto:/app/proto
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: kb-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: kb-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
